<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TUI Replay</title>
    <style>
:root {
  color: #1e242c;
  background: #f7f6f1;
  --ui-font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono-font: "SFMono-Regular", "SF Mono", "Cascadia Mono", "Menlo", "Consolas", monospace;
  font-family: var(--ui-font);
  font-synthesis: none;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(180deg, #fbfaf7 0%, #f2f0e9 100%);
}

button,
select,
input {
  font: inherit;
}

.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto auto auto;
  gap: 16px;
  padding: 22px clamp(16px, 3vw, 42px);
}

.topbar {
  position: relative;
  min-height: 32px;
  display: grid;
  grid-template-columns: 72px minmax(0, 1fr) minmax(140px, 220px);
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(190, 184, 172, 0.8);
  background: rgba(246, 244, 240, 0.94);
  backdrop-filter: blur(18px);
  padding: 3px 10px;
}

.window-controls {
  display: flex;
  align-items: center;
  gap: 7px;
  padding-left: 2px;
}

.traffic-light {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.12);
}

.traffic-light.close {
  background: #ff5f57;
}

.traffic-light.minimize {
  background: #ffbd2e;
}

.traffic-light.zoom {
  background: #28c840;
}

.title-group {
  min-width: 0;
  text-align: center;
}

h1 {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}

#trace-meta {
  min-height: 0;
  margin: 0;
  color: #5f6873;
  font-size: 11px;
  line-height: 1.1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

select {
  min-height: 24px;
  width: 100%;
  max-width: 100%;
  border: 1px solid rgba(212, 208, 198, 0.8);
  border-radius: 5px;
  background: rgba(255, 253, 250, 0.82);
  color: #20252d;
  padding: 0 8px;
  font-size: 12px;
}

.trace-picker {
  position: relative;
  min-width: 0;
}

.trace-trigger {
  width: 100%;
  min-width: 0;
  height: 22px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 10px;
  align-items: center;
  gap: 6px;
  border: 1px solid rgba(196, 190, 180, 0.78);
  border-radius: 999px;
  background: rgba(255, 253, 249, 0.72);
  color: #303742;
  padding: 0 8px 0 10px;
  cursor: pointer;
  font-size: 11px;
  line-height: 1;
}

.trace-trigger::after {
  content: "";
  width: 5px;
  height: 5px;
  border-right: 1.5px solid #6b7280;
  border-bottom: 1.5px solid #6b7280;
  transform: translateY(-1px) rotate(45deg);
}

.trace-trigger span {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.trace-trigger:hover,
.trace-trigger:focus-visible,
.trace-trigger[aria-expanded="true"] {
  border-color: rgba(117, 112, 104, 0.8);
  background: rgba(255, 253, 249, 0.92);
  outline: none;
}

.trace-picker.single .trace-trigger {
  grid-template-columns: minmax(0, 1fr);
  border-color: transparent;
  background: transparent;
  cursor: default;
}

.trace-picker.single .trace-trigger::after {
  display: none;
}

.trace-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  z-index: 20;
  width: min(360px, 72vw);
  max-height: 260px;
  overflow: auto;
  padding: 4px;
  border: 1px solid rgba(190, 184, 172, 0.9);
  border-radius: 8px;
  background: rgba(255, 253, 249, 0.98);
  box-shadow: 0 14px 34px rgba(23, 28, 35, 0.18);
}

.trace-option {
  width: 100%;
  min-height: 30px;
  border: 0;
  border-radius: 5px;
  background: transparent;
  color: #303742;
  padding: 7px 8px;
  text-align: left;
  cursor: pointer;
  font-size: 12px;
  line-height: 1.25;
}

.trace-option:hover,
.trace-option:focus-visible {
  background: #ebe7dd;
  outline: none;
}

.trace-option.active {
  background: #1f252e;
  color: #ffffff;
}

.stage {
  min-height: 0;
  display: grid;
  place-items: center;
  overflow: auto;
  padding: 8px 0 18px;
}

.terminal-window {
  --cols: 80;
  --rows: 24;
  --cell-width: 10px;
  --line-height: 20px;
  --font-size: 15px;
  --window-width: calc((var(--cols) * var(--cell-width)) + 32px);
  --window-height: calc(32px + (var(--rows) * var(--line-height)) + 32px);
  width: min(var(--window-width), 100%);
  height: min(var(--window-height), 100%);
  min-width: min(100%, 420px);
  max-height: 100%;
  overflow: hidden;
  border: 1px solid #252a33;
  border-radius: 8px;
  background: #101318;
  box-shadow: 0 16px 40px rgba(23, 28, 35, 0.18);
}

.terminal {
  width: 100%;
  height: calc(100% - 32px);
  min-height: 0;
  overflow: auto;
  background: #101318;
  color: #d4d4d8;
  padding: 16px;
}

.terminal-line {
  width: calc(var(--cols) * var(--cell-width));
  height: var(--line-height);
  white-space: pre;
  font-family: var(--mono-font);
  font-size: var(--font-size);
  line-height: var(--line-height);
  letter-spacing: 0;
}

.terminal-line span {
  display: inline-block;
  height: var(--line-height);
}

.cursor {
  outline: 1px solid #f8fafc;
  outline-offset: -1px;
  background: #f8fafc !important;
  color: #101318 !important;
  animation: cursor-blink 1.05s steps(1, end) infinite;
}

@keyframes cursor-blink {
  0%,
  52% {
    opacity: 1;
  }

  53%,
  100% {
    opacity: 0.22;
  }
}

.controls {
  display: grid;
  gap: 8px;
  max-width: 980px;
  width: 100%;
  margin: 0 auto;
}

.scrubber-row {
  display: grid;
  grid-template-columns: minmax(140px, 1fr) auto;
  align-items: center;
  gap: 12px;
}

.transport-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: fit-content;
  max-width: 100%;
  margin: 0 auto;
}

#speed-select {
  flex: 0 0 64px;
  width: 64px;
  min-width: 64px;
  max-width: 64px;
  min-height: 28px;
  padding: 0 6px;
}

.icon-button {
  width: 38px;
  height: 36px;
  border: 1px solid #d4d0c6;
  border-radius: 6px;
  background: #fffdfa;
  color: #1f252e;
  cursor: pointer;
}

.icon-button:hover,
.icon-button:focus-visible {
  border-color: #999286;
}

.icon-button.primary {
  background: #1f252e;
  border-color: #1f252e;
  color: #ffffff;
}

.scrubber {
  position: relative;
  min-width: 0;
  height: 32px;
  display: grid;
  align-items: center;
}

.scrubber-track {
  position: absolute;
  z-index: 3;
  left: 8px;
  right: 8px;
  top: 50%;
  height: 8px;
  overflow: visible;
  border-radius: 999px;
  background: #d8d4ca;
  transform: translateY(-50%);
  box-shadow: inset 0 0 0 1px rgba(31, 37, 46, 0.08);
  pointer-events: none;
}

.frame-progress {
  position: absolute;
  inset: 0 auto 0 0;
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: #1f252e;
  transition-property: width;
  transition-duration: 160ms;
  transition-timing-function: linear;
  will-change: width;
  pointer-events: none;
}

#frame-range {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 32px;
  margin: 0;
  cursor: pointer;
  opacity: 0;
}

.frame-notches {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

.frame-notch {
  position: absolute;
  top: 50%;
  width: 2px;
  height: 10px;
  border-radius: 999px;
  background: #8f968f;
  transform: translate(-50%, -50%);
  opacity: 0.65;
}

.frame-notch.active {
  width: 3px;
  height: 14px;
  background: #ffffff;
  box-shadow: 0 0 0 1px #1f252e;
  opacity: 1;
}

.annotation-marker {
  position: absolute;
  top: 50%;
  width: 10px;
  height: 10px;
  border: 2px solid #fffdfa;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(31, 37, 46, 0.35);
  transform: translate(-50%, -50%);
  pointer-events: auto;
  cursor: pointer;
}

.annotation-marker:hover,
.annotation-marker:focus,
.annotation-marker:focus-visible {
  z-index: 4;
  outline: none;
  box-shadow: 0 0 0 2px #fffdfa, 0 0 0 4px rgba(31, 37, 46, 0.42);
}

.annotation-marker::after {
  content: attr(data-tooltip);
  position: absolute;
  z-index: 30;
  bottom: calc(100% + 9px);
  left: 50%;
  width: max-content;
  max-width: min(360px, 72vw);
  transform: translateX(-50%);
  border: 1px solid rgba(31, 37, 46, 0.16);
  border-radius: 7px;
  background: rgba(31, 37, 46, 0.96);
  color: #fffdfa;
  padding: 8px 10px;
  font-size: 11px;
  line-height: 1.35;
  white-space: pre-line;
  box-shadow: 0 12px 28px rgba(23, 28, 35, 0.18);
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.annotation-marker:hover::after,
.annotation-marker:focus::after,
.annotation-marker:focus-visible::after {
  opacity: 1;
  visibility: visible;
}

#frame-counter {
  min-width: 112px;
  text-align: right;
  color: #4e5661;
  font-variant-numeric: tabular-nums;
  font-size: 13px;
}

.timeline {
  max-width: 980px;
  width: 100%;
  margin: 0 auto;
  overflow-x: scroll;
  overflow-y: hidden;
  padding: 0 0 8px;
  scrollbar-gutter: stable both-edges;
  scroll-snap-type: x proximity;
}

#timeline {
  display: flex;
  gap: 8px;
  justify-content: flex-start;
  min-width: max-content;
  width: max-content;
  padding: 0 2px;
}

.thumb {
  position: relative;
  width: 140px;
  height: 82px;
  flex: 0 0 auto;
  scroll-snap-align: center;
  overflow: hidden;
  border: 1px solid #d8d4ca;
  border-radius: 6px;
  background: #fffdfa;
  color: #303742;
  cursor: pointer;
  padding: 6px;
  text-align: left;
}

.thumb.active {
  border-color: #1f252e;
  box-shadow: inset 0 0 0 1px #1f252e;
}

.thumb.has-annotation {
  border-color: #b7c8bd;
}

.thumb:hover,
.thumb:focus,
.thumb:focus-visible {
  border-color: #999286;
  outline: none;
}

.thumb.has-annotation::before {
  content: "";
  position: absolute;
  top: 7px;
  right: 7px;
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: #2f7d62;
  box-shadow: 0 0 0 2px #fffdfa;
}

.annotation-thumb {
  display: grid;
  grid-template-rows: auto auto minmax(0, 1fr) auto;
  gap: 4px;
  border-color: #a9c8b8;
  background: #f4faf6;
}

.annotation-thumb:hover,
.annotation-thumb:focus,
.annotation-thumb:focus-visible {
  border-color: #2f7d62;
  box-shadow: inset 0 0 0 1px rgba(47, 125, 98, 0.42);
}

.annotation-thumb::after {
  content: attr(data-tooltip);
  position: absolute;
  inset: 6px;
  z-index: 5;
  overflow: hidden;
  border: 1px solid rgba(47, 125, 98, 0.2);
  border-radius: 5px;
  background: rgba(31, 37, 46, 0.96);
  color: #fffdfa;
  padding: 7px;
  font-size: 10px;
  line-height: 1.28;
  text-align: left;
  white-space: pre-line;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.annotation-thumb:hover::after,
.annotation-thumb:focus::after,
.annotation-thumb:focus-visible::after {
  opacity: 1;
  visibility: visible;
}

.thumb-time {
  display: block;
  color: #69717c;
  font-size: 11px;
  line-height: 1;
  margin-bottom: 5px;
  font-variant-numeric: tabular-nums;
}

.thumb-annotation {
  display: block;
  width: fit-content;
  max-width: 100%;
  margin-bottom: 4px;
  overflow: hidden;
  border-radius: 999px;
  background: #e3efe8;
  color: #244c3d;
  padding: 2px 6px;
  font-size: 10px;
  line-height: 1.1;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.thumb-annotation-kind {
  display: block;
  width: fit-content;
  max-width: 100%;
  overflow: hidden;
  border-radius: 999px;
  color: #ffffff;
  padding: 2px 6px;
  font-size: 10px;
  font-weight: 700;
  line-height: 1.1;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.thumb-annotation-title {
  display: block;
  min-width: 0;
  overflow: hidden;
  color: #1f252e;
  font-size: 12px;
  line-height: 1.15;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.thumb-annotation-summary {
  min-width: 0;
  overflow: hidden;
  color: #4e5661;
  font-size: 10px;
  line-height: 1.2;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.thumb pre {
  margin: 0;
  overflow: hidden;
  max-height: 54px;
  color: #1f252e;
  font-family: var(--mono-font);
  font-size: 9px;
  line-height: 1.15;
  white-space: pre;
}

.details {
  max-width: 980px;
  width: 100%;
  margin: 0 auto;
  display: grid;
  gap: 8px;
  color: #303742;
  font-size: 13px;
}

.details-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
}

.frame-context {
  padding-bottom: 2px;
}

.details code {
  color: #20252d;
  background: #ebe7dd;
  border-radius: 4px;
  padding: 2px 5px;
}

.expectations,
.annotations {
  display: grid;
  gap: 6px;
}

.annotation-detail {
  display: grid;
  gap: 5px;
  padding: 6px 0;
  border-top: 1px solid rgba(216, 212, 202, 0.72);
}

.annotation-detail:first-of-type {
  border-top: 0;
}

.annotation-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 6px 8px;
}

.annotation-detail strong {
  color: #1f252e;
}

.annotation-description,
.annotation-detail span {
  color: #4e5661;
}

.annotation-kind {
  border-radius: 999px;
  background: #e3efe8;
  color: #244c3d !important;
  padding: 2px 6px;
  font-size: 11px;
  line-height: 1;
}

.annotation-evidence {
  display: grid;
  gap: 6px;
}

.annotation-assertion {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 6px;
  border-radius: 5px;
  background: #f0ede5;
  padding: 5px 7px;
}

.annotation-assertion.passed {
  background: #e3efe8;
}

.annotation-assertion.failed {
  background: #f6e5df;
}

.annotation-attachment {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 6px 8px;
  align-items: center;
  width: fit-content;
  max-width: 100%;
  color: #1f252e;
  text-decoration: none;
}

.annotation-attachment:hover,
.annotation-attachment:focus-visible {
  text-decoration: underline;
}

.annotation-attachment img {
  grid-row: span 2;
  max-width: 180px;
  max-height: 120px;
  border: 1px solid #d8d4ca;
  border-radius: 5px;
  background: #fffdfa;
  object-fit: contain;
}

.annotation-attachment small {
  color: #69717c;
}

.details-heading {
  color: #4e5661;
  font-size: 12px;
  font-weight: 700;
}

.expectation {
  margin: 0;
  overflow-x: auto;
  white-space: pre;
  font-family: var(--mono-font);
  font-size: 12px;
  line-height: 1.45;
}

.empty {
  color: #69717c;
}

@media (max-width: 720px) {
  .app {
    grid-template-rows: minmax(0, 1fr) auto auto auto;
  }

  .topbar {
    grid-template-columns: 58px minmax(0, 1fr) minmax(110px, 150px);
    grid-template-areas: "controls title select";
    align-items: center;
  }

  .window-controls {
    grid-area: controls;
  }

  .title-group {
    grid-area: title;
    text-align: left;
  }

  .trace-picker {
    grid-area: select;
    max-width: 100%;
  }

  .scrubber-row {
    grid-template-columns: 1fr;
  }

  .transport-row {
    justify-content: flex-start;
  }

  #frame-counter {
    text-align: left;
  }
}
</style>
  </head>
  <body>
    <main class="app">
      <section id="stage" class="stage" aria-label="Terminal replay">
        <div id="terminal-window" class="terminal-window">
          <header class="topbar" aria-label="Viewer toolbar">
            <div class="window-controls" aria-hidden="true">
              <span class="traffic-light close"></span>
              <span class="traffic-light minimize"></span>
              <span class="traffic-light zoom"></span>
            </div>
            <div class="title-group">
              <h1>TUI Replay</h1>
              <p id="trace-meta"></p>
            </div>
            <div id="trace-picker" class="trace-picker">
              <button id="trace-trigger" class="trace-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="trace-trigger-label"></span>
              </button>
              <div id="trace-menu" class="trace-menu" role="listbox" hidden></div>
            </div>
          </header>
          <div id="terminal" class="terminal" role="img" aria-label="Terminal frame"></div>
        </div>
      </section>

      <section class="controls" aria-label="Playback controls">
        <div class="scrubber-row">
          <div class="scrubber">
            <div class="scrubber-track">
              <div id="frame-progress" class="frame-progress"></div>
              <div id="frame-notches" class="frame-notches"></div>
            </div>
            <input id="frame-range" type="range" min="0" max="0" value="0" aria-label="Frame">
          </div>
          <output id="frame-counter"></output>
        </div>
        <div class="transport-row">
          <button id="previous-frame" class="icon-button" type="button" aria-label="Previous frame">&#9198;</button>
          <button id="play-toggle" class="icon-button primary" type="button" aria-label="Play">&#9654;</button>
          <button id="next-frame" class="icon-button" type="button" aria-label="Next frame">&#9197;</button>
          <select id="speed-select" aria-label="Playback speed">
            <option value="0.25">0.25x</option>
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
            <option value="8">8x</option>
          </select>
        </div>
      </section>

      <section class="timeline" aria-label="Frame previews">
        <div id="timeline"></div>
      </section>

      <section id="details" class="details" aria-label="Trace details"></section>
    </main>
    <script type="module">
/* tui-replay selectors (inlined) */
function annotationsForFrame(trace, frameIndex) {
    return trace.annotations.filter((annotation) => annotation.frameIndex === frameIndex);
}
function frameIndexAtTime(frames, traceTime) {
    let low = 0;
    let high = frames.length - 1;
    while (low <= high) {
        const mid = Math.floor((low + high) / 2);
        if (frames[mid].time <= traceTime) {
            low = mid + 1;
        }
        else {
            high = mid - 1;
        }
    }
    return clamp(high, 0, Math.max(0, frames.length - 1));
}
function timelineFrames(frames, selectedIndex, maxFrames = 260) {
    if (frames.length <= maxFrames) {
        return frames;
    }
    const sampled = new Map();
    const step = Math.ceil(frames.length / maxFrames);
    for (let i = 0; i < frames.length; i += step) {
        sampled.set(i, frames[i]);
    }
    sampled.set(0, frames[0]);
    sampled.set(selectedIndex, frames[selectedIndex]);
    sampled.set(frames.length - 1, frames.at(-1));
    return [...sampled.entries()]
        .sort(([a], [b]) => a - b)
        .map(([, frame]) => frame);
}
function timelineItems(trace, selectedIndex, maxFrames = Number.POSITIVE_INFINITY) {
    const frameItems = timelineFrames(trace.frames, selectedIndex, maxFrames).map((frame) => ({
        type: "frame",
        id: `frame-${frame.index}`,
        timeMs: frame.time,
        frame
    }));
    const annotationItems = trace.annotations.map((annotation) => ({
        type: "annotation",
        id: `annotation-${annotation.id}`,
        timeMs: annotation.timeMs,
        annotation
    }));
    return [...frameItems, ...annotationItems].sort((a, b) => {
        if (a.timeMs !== b.timeMs) {
            return a.timeMs - b.timeMs;
        }
        if (a.type !== b.type) {
            return a.type === "frame" ? -1 : 1;
        }
        return a.id.localeCompare(b.id);
    });
}
function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);

function startPlayback() {

    renderPlaybackAt(trace, traceTime);

function setFrame(index) {

function renderPlaybackAt(trace, traceTime) {

function renderFrame(trace, frameIndex) {

}
function currentTrace() {

}
function traceKey(trace) {
    return `${trace.summary.filePath}\n${trace.summary.testTitle}\n${trace.summary.attempt ?? ""}`;
}
function traceSourceValue(trace, traces = state.model?.traces ?? []) {

    return duplicateSources ? traceKey(trace) : trace.summary.filePath;
}
function traceSourceCandidates(trace, traces = state.model?.traces ?? []) {

}
function applyTraceSelectionFromUrl() {

    }
    const index = traces.findIndex((trace) => traceSourceCandidates(trace, traces).includes(source));

    }

}
function writeSelectedTraceToUrl(mode) {

    }

        url.searchParams.delete(sourceQueryParam);

function modelSignature(model) {
    return model.traces
        .map((trace) => {
        const lastFrame = trace.frames.at(-1);
        return [
            trace.summary.filePath,
            trace.summary.testTitle,
            trace.summary.attempt ?? "",
            trace.summary.frameCount,
            trace.summary.durationMs,
            trace.summary.rows,
            trace.summary.cols,
            lastFrame?.plainText ?? "",
            trace.annotations
                .map((annotation) => `${annotation.id}:${annotation.timeMs}:${annotation.frameIndex}:${annotation.kind ?? ""}:${annotation.color ?? ""}:${annotation.label}:${annotation.description ?? ""}:${JSON.stringify(annotation.assertions)}:${JSON.stringify(annotation.attachments)}`)

}
function applyStyle(span, segment) {
    if (segment.fg)
        span.style.color = segment.fg;
    if (segment.bg)
        span.style.backgroundColor = segment.bg;
    if (segment.bold)
        span.style.fontWeight = "700";
    if (segment.dim)
        span.style.opacity = "0.72";
    if (segment.italic)
        span.style.fontStyle = "italic";
    if (segment.underline)
        span.style.textDecoration = "underline";
    if (segment.cursor)
        span.classList.add("cursor");
}
function thumbnailText(frame) {
    const lines = frame.plainText.split("\n").slice(0, 6);
    return lines.map((line) => line.slice(0, 28)).join("\n") || " ";
}
function colorForAnnotation(annotation) {
    switch (annotation.kind) {
        case "oauth":
            return "#2f7d62";
        case "user":
            return "#8a5cf6";
        case "assertion":
            return "#b7791f";
        default:
            return "#2664d8";
    }
}
function annotationTooltip(annotation) {
    const lines = [`${formatDuration(annotation.timeMs)} · ${annotation.label}`];
    if (annotation.description) {
        lines.push(annotation.description);
    }
    const counts = annotationEvidenceCounts(annotation);
    if (counts) {
        lines.push(counts);
    }
    for (const assertion of annotation.assertions.slice(0, 3)) {
        lines.push(`assert: ${assertion.label}${assertion.passed == null ? "" : assertion.passed ? " passed" : " failed"}`);
    }

}
function annotationEvidenceCounts(annotation) {
    const attachmentCount = annotation.attachments.length + annotation.assertions.reduce((count, assertion) => count + (assertion.attachments?.length ?? 0), 0);
    const parts = [];
    if (annotation.assertions.length > 0) {
        parts.push(`${annotation.assertions.length} assert${annotation.assertions.length === 1 ? "" : "s"}`);
    }
    if (attachmentCount > 0) {
        parts.push(`${attachmentCount} attachment${attachmentCount === 1 ? "" : "s"}`);
    }

}
function renderAnnotationEvidence(annotation, parent) {
    if (annotation.assertions.length === 0 && annotation.attachments.length === 0) {

    evidence.className = "annotation-evidence";
    annotation.assertions.forEach((assertion) => {
        const row = document.createElement("div");
        row.className = `annotation-assertion${assertion.passed === false ? " failed" : assertion.passed === true ? " passed" : ""}`;
        const label = document.createElement("strong");
        label.textContent = assertion.label;
        row.append(label);
        if (assertion.message) {
            const message = document.createElement("span");
            message.textContent = assertion.message;
            row.append(message);
        }
        if (assertion.expected || assertion.actual) {
            const comparison = document.createElement("code");
            comparison.textContent = [assertion.expected ? `expected: ${assertion.expected}` : "", assertion.actual ? `actual: ${assertion.actual}` : ""]
                .filter(Boolean)
                .join(" | ");
            row.append(comparison);
        }
        evidence.append(row);
        (assertion.attachments ?? []).forEach((attachment) => appendAttachment(evidence, attachment));
    });

    if (evidence.childElementCount > 0) {

    }
}
function appendAttachment(parent, attachment) {
    const rendered = renderAttachment(attachment);
    if (rendered) {
        parent.append(rendered);
    }
}
function renderAttachment(attachment) {
    const href = attachmentHref(attachment);
    if (!href) {
        return undefined;
    }
    const wrapper = document.createElement("a");
    wrapper.className = "annotation-attachment";
    wrapper.href = href;
    wrapper.target = attachment.url ? "_blank" : "_self";
    wrapper.rel = "noreferrer";
    if (isImageAttachment(attachment)) {
        const image = document.createElement("img");
        image.src = wrapper.href;
        image.alt = attachment.label ?? attachment.description ?? "Annotation attachment";
        wrapper.append(image);
    }
    const label = document.createElement("span");
    label.textContent = attachment.label ?? attachment.path?.split(/[\\/]/).at(-1) ?? attachment.url ?? "Attachment";
    wrapper.append(label);
    if (attachment.description) {

        description.textContent = attachment.description;

function attachmentHref(attachment) {

function isImageAttachment(attachment) {

function centerActiveThumbnail() {
    const active = timeline.querySelector(".thumb.active");
    const strip = timeline.parentElement;

        return;
    }
    window.requestAnimationFrame(() => {
        const left = active.offsetLeft - (strip.clientWidth - active.offsetWidth) / 2;
        strip.scrollTo({
            left: Math.max(0, left),
            behavior: state.playing ? "auto" : "smooth"

}
function labelValue(label, value) {
    const wrapper = document.createElement("span");
    const strong = document.createElement("strong");
    strong.textContent = `${label}: `;
    const code = document.createElement("code");
    code.textContent = value;

}
function formatDuration(ms) {

    }
    return `${(ms / 1000).toFixed(2)}s`;
}
function compactPath(filePath) {

}
function clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
}
function roundTo(value, places) {

    return Math.round(value * factor) / factor;
}
function syncProgress(trace, traceTime) {

function anchorPlayback(traceTime, now) {

function progressForFrame(trace, frameIndex) {
