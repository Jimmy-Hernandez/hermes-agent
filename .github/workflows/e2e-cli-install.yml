name: E2E CLI Tests

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  e2e-tui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: cd e2e && CI=true npm run test
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

      - name: Bundle TUI traces into self-contained replay HTML
        if: always()
        run: node e2e/scripts/bundle-replay-html.mjs

      - name: Upload TUI replay viewer
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tui-replay-viewer
          path: tui-replay-viewer/
          retention-days: 7

      - name: Upload raw TUI test traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tui-test-traces
          path: e2e/tui-traces/
          retention-days: 7
